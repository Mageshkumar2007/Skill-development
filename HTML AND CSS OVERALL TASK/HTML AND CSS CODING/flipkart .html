<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f3f6;
}

/* HEADER */

header{
    background:#2874f0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    color:white;
    position:sticky;
    top:0;
}

.logo{
    font-size:30px;
    font-style:italic;
    font-weight:bold;
}

.search-box{
    width:45%;
}

.search-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
}

.login-btn{
    background:white;
    color:#2874f0;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

/* CATEGORY */

.categories{
    display:flex;
    justify-content:space-around;
    background:white;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.category{
    text-align:center;
    cursor:pointer;
}

.category img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:50%;
}

.category p{
    margin-top:8px;
    font-weight:bold;
}

/* BANNER */

.banner{
    margin:20px;
    background:linear-gradient(to right,#2874f0,#00bcd4);
    color:white;
    text-align:center;
    padding:80px 20px;
    border-radius:10px;
}

.banner h1{
    font-size:55px;
}

.banner p{
    font-size:22px;
    margin-top:10px;
}

/* PRODUCTS */

.products-title{
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:green;
    font-size:20px;
    margin-bottom:10px;
}

.card button{
    background:#fb641b;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

/* LOGIN SECTION */

.login-section{
    background:white;
    width:350px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
}

.login-section h2{
    text-align:center;
    margin-bottom:20px;
}

.login-section input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

.login-section button{
    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

/* FOOTER */

footer{
    background:#172337;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

header{
    flex-direction:column;
    gap:15px;
}

.search-box{
    width:100%;
}

.categories{
    flex-wrap:wrap;
    gap:20px;
}

.banner h1{
    font-size:35px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">Flipkart</div>

<div class="search-box">
<input type="text" placeholder="Search for products, brands and more">
</div>

<nav>
<a href="#">Home</a>
<a href="#">Orders</a>
<a href="#">Cart</a>
</nav>

<button class="login-btn">Login</button>

</header>

<!-- CATEGORY -->

<section class="categories">

<div class="category">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<p>Mobiles</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<p>Watches</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<p>Shoes</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
<p>Headphones</p>
</div>

<div class="category">
<img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">
<p>Fashion</p>
</div>

</section>

<!-- BANNER -->

<section class="banner">

<h1>Big Billion Days</h1>
<p>Up to 70% OFF on Electronics & Fashion</p>

</section>

<!-- PRODUCTS -->

<div class="products-title">
Best Selling Products
</div>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="card-content">
<h3>iPhone 15</h3>
<p class="price">₹79,999</p>
<button>Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="card-content">
<h3>Smart Watch</h3>
<p class="price">₹2,999</p>
<button>Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">
<div class="card-content">
<h3>Headphones</h3>
<p class="price">₹1,499</p>
<button>Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="card-content">
<h3>Sports Shoes</h3>
<p class="price">₹3,499</p>
<button>Buy Now</button>
</div>
</div>

</section>

<!-- LOGIN FORM -->

<section class="login-section">

<h2>Login</h2>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Login</button>

</section>

<!-- FOOTER -->

<footer>

<p>© 2026 Flipkart Clone Website | HTML & CSS Project</p>

</footer>

</body>
</html>
