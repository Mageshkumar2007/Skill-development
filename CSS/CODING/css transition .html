<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Transition</title>
    <style>
        .box {
            width: 150px;
            height: 150px;
            background-color: blue;
            color: white;
            text-align: center;
            line-height: 150px;
            margin: 100px auto;
            /* Transition property */
            transition: 0.5s;
        }

        .box:hover {
            background-color: red;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="box">Hover Me</div>
</body>
</html>
